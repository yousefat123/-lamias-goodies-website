<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamia's Goodies — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800&family=Almarai:wght@400;700&family=Rubik:wght@400;500;600;700&family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-lang="ar">

<header>
  <div class="wrap">
    <div class="brand">
      <div class="brand-mark">LG</div>
      <div class="brand-name" data-i18n="brandName">حلويات لمياء</div>
    </div>
    <div class="lang-switch">
      <button data-setlang="ar" class="active">AR</button>
      <button data-setlang="he">עב</button>
      <button data-setlang="en">EN</button>
    </div>
  </div>
</header>

<main>
  <div class="wrap auth-page-wrap">
    <a class="back-link" href="index.html" data-i18n="backToSite">العودة إلى الموقع</a>

    <div class="auth-page-card">
      <h1 class="auth-page-title" id="authPageTitle" data-i18n="welcomeBack">مرحبًا بعودتك</h1>

      <button type="button" class="btn btn-ghost auth-google-btn" id="loginGoogleBtn" data-i18n="continueWithGoogle">
        المتابعة عبر جوجل
      </button>

      <div class="auth-divider"><span data-i18n="orDivider">أو</span></div>

      <form id="loginForm">
        <div class="field-row">
          <label data-i18n="emailLabel">البريد الإلكتروني</label>
          <input type="email" id="loginEmail" autocomplete="username" required>
        </div>
        <div class="field-row">
          <label data-i18n="passwordLabel">كلمة المرور</label>
          <input type="password" id="loginPassword" autocomplete="current-password" required>
        </div>
        <div id="loginError" class="form-error" hidden></div>
        <button type="submit" class="btn btn-primary auth-submit-btn" id="loginSubmitBtn" data-i18n="signIn">
          تسجيل الدخول
        </button>
      </form>

      <a href="#" class="toggle-auth-link" id="loginToggleModeLink" data-i18n="toggleToSignUp"></a>

      <div class="auth-divider"><span data-i18n="orDivider">أو</span></div>

      <div id="phoneSection">
        <div class="field-row">
          <label data-i18n="phoneLabel">رقم الهاتف</label>
          <div class="phone-input-group">
            <span class="phone-prefix">+972</span>
            <input type="tel" id="loginPhone" inputmode="numeric" placeholder="5X-XXXXXXX">
          </div>
        </div>
        <button type="button" class="btn btn-ghost auth-submit-btn" id="sendCodeBtn" data-i18n="sendCode">
          إرسال الرمز
        </button>

        <div class="field-row" id="codeFieldRow" hidden>
          <label data-i18n="verificationCodeLabel">رمز التحقق</label>
          <input type="text" id="loginCode" inputmode="numeric" placeholder="123456">
        </div>
        <button type="button" class="btn btn-primary auth-submit-btn" id="verifyCodeBtn" data-i18n="verifyCode" hidden>
          تحقق
        </button>

        <div id="phoneError" class="form-error" hidden></div>
      </div>
      <div id="recaptcha-container"></div>
    </div>
  </div>
</main>

<footer>
  <div data-i18n="footerNote">لمياء غودز — صُنع بحب 🍯</div>
</footer>

<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/login.js"></script>
</body>
</html>
